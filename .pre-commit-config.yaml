repos:
  - repo: local
    hooks:
      # Reuse the Makefile targets so the hook and CI (`make check`) share one
      # definition of scope — formatting and linting can't drift apart and
      # silently miss a directory (e.g. scripts/) the way hand-rolled hooks did.
      - id: format
        name: Format
        entry: make format
        language: system
        pass_filenames: false
        always_run: true

      - id: lint
        name: Lint
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true

      - id: gitleaks
        name: Gitleaks
        entry: gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
