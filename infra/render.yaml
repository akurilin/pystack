# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Mirrors the current Render deployment discovered from the active workspace.
# Public onrender.com URLs are literal because Blueprints cannot interpolate
# another service's public URL.
services:
  - type: web
    name: pystack-backend
    runtime: python
    repo: https://github.com/akurilin/pystack
    branch: main
    rootDir: backend
    plan: free
    region: virginia
    autoDeployTrigger: commit
    buildCommand: uv sync --frozen --no-dev
    startCommand: .venv/bin/uvicorn pystack_api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYSTACK_DATABASE_URL
        fromDatabase:
          name: pystack-db
          property: connectionString
      # Allow both the onrender URL and the custom domain the frontend is served
      # from. render_infra.py reconciles these to the same value on `make infra`.
      - key: PYSTACK_CORS_ORIGINS
        value: '["https://pystack-frontend.onrender.com","https://pystack.kuril.in"]'
      - key: PYSTACK_CLERK_AUTHORIZED_PARTIES
        value: '["https://pystack-frontend.onrender.com","https://pystack.kuril.in"]'
      - key: PYSTACK_OPENROUTER_API_KEY
        sync: false
      - key: PYSTACK_CLERK_SECRET_KEY
        sync: false
      # Sentry DSN for backend error monitoring. Kept out of the repo via
      # sync:false so forks/reuses don't report into this Sentry project; set in
      # the Render dashboard.
      - key: PYSTACK_SENTRY_DSN
        sync: false
      # Tags Sentry events as production (vs. the default "development").
      - key: PYSTACK_ENVIRONMENT
        value: production

  - type: web
    name: pystack-frontend
    runtime: static
    repo: https://github.com/akurilin/pystack
    branch: main
    rootDir: frontend
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # Single-page app: serve index.html for client-side routes (e.g. /board) so a
    # direct visit or refresh doesn't 404.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Custom domain (CNAME onto this static site) the app is served from.
    domains:
      - pystack.kuril.in
    envVars:
      - key: VITE_API_URL
        value: https://pystack-backend.onrender.com
      # Build-time publishable key (safe to expose in the bundle). Use the Clerk
      # production instance's pk_live_ key here.
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      # Sentry DSN for frontend error monitoring. Write-only and shipped in the
      # bundle anyway, but kept out of the repo via sync:false so forks/reuses
      # don't inherit it and send errors to this Sentry project. Set in the
      # Render dashboard.
      - key: VITE_SENTRY_DSN
        sync: false

databases:
  - name: pystack-db
    databaseName: pystack_prod
    user: pystack_prod_user
    plan: free
    region: virginia
    postgresMajorVersion: "18"
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere
