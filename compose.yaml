services:
  db:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: pystack
      POSTGRES_PASSWORD: pystack
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pystack -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  postgres_data:
