name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
          cache: false

      - name: Install repository tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install github.com/amacneil/dbmate/v2@v2.30.0
          go install github.com/zricethezav/gitleaks/v8@v8.30.0

      - name: Install dependencies
        run: make backend-sync frontend-install

      - name: Run checks
        run: make check

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
          cache: false

      - name: Install dbmate
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install github.com/amacneil/dbmate/v2@v2.30.0

      - name: Install dependencies
        run: make backend-sync frontend-install

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        # The app validates assistant config at startup, so the Playwright-spawned
        # backend needs a key present. The smoke test never calls the assistant;
        # a dummy value is enough, matching the backend test suite's fixture.
        #
        # The Clerk vars drive the real sign-in: the publishable key initializes
        # Clerk in the browser (Vite exposes VITE_-prefixed process env to the
        # client), the secret key lets clerkSetup mint a testing token, and the
        # E2E_CLERK_USER_* creds are the dev-instance test user. Locally these
        # come from the repo-root .env; in CI they come from repo secrets.
        env:
          PYSTACK_OPENROUTER_API_KEY: test-openrouter-key
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          PYSTACK_CLERK_SECRET_KEY: ${{ secrets.PYSTACK_CLERK_SECRET_KEY }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
        run: make test-e2e
